# heimdall configuration — generated by `heimdall init --format toml`.
apiVersion = "heimdall.io/v1alpha1"
kind = "HeimdallConfig"

[runtime]
cgroup = "/sys/fs/cgroup/kubepods"
listen = "0.0.0.0:12345"
relayIp = "127.0.0.1"
dnsListen = "0.0.0.0:5358"
fakeIpCidr = "198.19.0.0/16"
apiListen = "0.0.0.0:9999"
stateDir = "/var/lib/heimdall"
flowRetentionSecs = 259200

[runtime.tap]
enabled = false
persist = false

[connections.default]
description = "SOCKS5 upstream — replace addr with your proxy"
type = "socks5"
addr = "127.0.0.1:1080"

[connections.direct]
type = "direct"

[podRouting]
routingKey = "heimdall.io/routing"
observeKey = "heimdall.io/observe"
rules = []

[podRouting.default]
use = "default"
observe = false

# Defaults for `heimdall <subcommand>` (consumed by planned `heimdall run`).
[cli.run.default]
connection = "default"
observe = true

[cli.run.profiles]
